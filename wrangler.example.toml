name = "imgbed"
main = "src/index.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
MAX_SIZE_MB    = "20"
ALLOW_PUBLIC   = "true"
ALLOWED_MIME   = "image/png,image/jpeg,image/webp,image/gif,image/avif,image/bmp"
PUBLIC_BASE    = ""
# Admin path = /<META_KV_ID>/<ADMIN_TOKEN>/ — keep this in sync with [[kv_namespaces]].id below.
META_KV_ID     = "REPLACE_WITH_YOUR_KV_ID"

[[r2_buckets]]
binding     = "BUCKET"
bucket_name = "imgbed"

[[kv_namespaces]]
binding = "META"
id      = "REPLACE_WITH_YOUR_KV_ID"

[ai]
binding = "AI"

# Optional: pin to a custom domain.
# [[routes]]
# pattern = "img.example.com"
# custom_domain = true

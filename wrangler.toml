name = "imgbed"
main = "src/index.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Public-facing settings. Override via dashboard or `wrangler.toml` locally.
[vars]
MAX_SIZE_MB   = "20"
ALLOW_PUBLIC  = "false"   # if "true", anonymous uploads allowed
ALLOWED_MIME  = "image/png,image/jpeg,image/webp,image/gif,image/avif,image/svg+xml,image/bmp,image/x-icon"
PUBLIC_BASE   = ""         # e.g. "https://img.example.com"; falls back to request origin

[[r2_buckets]]
binding     = "BUCKET"
bucket_name = "imgbed"

# Optional: pin the worker to a custom domain — uncomment after the zone is in your account.
# [[routes]]
# pattern = "img.example.com"
# custom_domain = true
